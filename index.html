<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>MP3 App</title>

  <!-- Mode app iPhone -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MP3 App">
  <link rel="apple-touch-icon" href="icon.png">

  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #111;
      color: #fff;
    }

    h2 {
      margin-bottom: 30px;
    }

    input, button {
      margin: 10px;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #ff3b3b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff1f1f;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>

<h2>Convertisseur MP3</h2>

<input type="file" id="fileInput">
<br>

<button onclick="convert()">Convertir en MP3</button>
<br>

<button onclick="installApp()">Installer l’app</button>

<p id="status"></p>

<!-- FFmpeg -->
<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;
const ffmpeg = createFFmpeg({ log: true });

async function convert() {
  const fileInput = document.getElementById('fileInput');
  const status = document.getElementById('status');

  if (!fileInput.files.length) {
    alert("Choisis un fichier");
    return;
  }

  const file = fileInput.files[0];
  status.innerText = "Chargement du moteur...";

  if (!ffmpeg.isLoaded()) {
    await ffmpeg.load();
  }

  ffmpeg.FS('writeFile', file.name, await fetchFile(file));

  status.innerText = "Conversion en cours...";

  await ffmpeg.run('-i', file.name, 'output.mp3');

  const data = ffmpeg.FS('readFile', 'output.mp3');

  const url = URL.createObjectURL(new Blob([data.buffer], { type: 'audio/mpeg' }));
  const a = document.createElement('a');
  a.href = url;
  a.download = 'output.mp3';
  a.click();

  status.innerText = "Terminé ✔️";
}

function installApp() {
  alert("Sur iPhone :\n\n1. Appuie sur le bouton Partager\n2. Choisis 'Sur l’écran d’accueil'");
}
</script>

</body>
</html>
